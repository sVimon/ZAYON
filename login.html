<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVOR GOLD | AUTHENTICATION</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="cyber-bg"></div>
    <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-right"></i><span>العودة</span></a>

    <main class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="emoji-logo" style="font-size: 3.5rem; margin-bottom: 15px;">💰</div>
                <h2> ZAYON</h2>
                <p>  المرجو إدخال الأيدي ID الخاص بحسابك </p>
            </div>

            <div class="input-wrapper">
                <i class="fa-solid fa-key input-icon"></i>
                <input type="password" id="secret-key" placeholder="**** **** ****" autocomplete="off">
                <div class="input-line"></div>
            </div>

            <button id="auth-submit" class="btn-auth">
                <span> التأكد من الأيدي</span>
                <i class="fa-solid fa-fingerprint"></i>
            </button>

            <div class="terminal-box" id="terminal">
                <div class="term-header"><span>Terminal</span><span class="dots"><span></span><span></span><span></span></span></div>
                <div class="term-content" id="term-output">> بانتظار إدخال الأيدي...</div>
            </div>
        </div>
    </main>
    <script src="login.js"></script>
</body>
</html>
